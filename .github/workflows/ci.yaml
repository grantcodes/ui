name: CI

on:
  pull_request:
    branches:
      - main
      - beta
  push:
    branches:
      - main
      - beta

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        name: Setup node
        with:
          node-version: 22

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile
        name: Install dependencies

      - run: pnpm lint
        name: Lint

      - run: pnpm test
        name: Test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        name: Setup node
        with:
          node-version: 22

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile
        name: Install dependencies

      - name: Clear turbo cache
        run: rm -rf .turbo

      - run: pnpm build --force
        name: Build


