name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Checkout code

      - uses: googleapis/release-please-action@v4
        name: Create release PR
        id: release
        with:
          config-file: release-please-config.json

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        if: ${{ steps.release.outputs.releases_created }}

      - uses: actions/setup-node@v6
        name: Setup node
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm install --frozen-lockfile
        name: Install dependencies
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm test
        name: Run tests
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm build
        name: Run build (includes CEM regeneration for @grantcodes/ui)
        if: ${{ steps.release.outputs.releases_created }}

      # Regenerate derived artifacts from the just-built CEM, then verify
      # the working tree is clean — any diff aborts the publish.
      - name: Regenerate Astro component typings from CEM
        run: pnpm --filter @grantcodes/astro gen:props
        if: ${{ steps.release.outputs.releases_created }}

      - name: Check for dirty working tree (generated artifact drift)
        run: git diff --exit-code
        if: ${{ steps.release.outputs.releases_created }}

      - name: Publish @grantcodes/ui
        if: ${{ steps.release.outputs['packages/ui--release_created'] }}
        working-directory: packages/ui
        run: pnpm publish  --provenance --access public

      - name: Publish @grantcodes/style-dictionary
        if: ${{ steps.release.outputs['packages/style-dictionary--release_created'] }}
        working-directory: packages/style-dictionary
        run: pnpm publish  --provenance --access public

      - name: Publish @grantcodes/astro
        if: ${{ steps.release.outputs['packages/astro--release_created'] }}
        working-directory: packages/astro
        run: pnpm publish  --provenance --access public
