name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      - uses: googleapis/release-please-action@v4
        name: Create release PR
        id: release
        with:
          config-file: release-please-config.json

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.pull_request_merged }}

      - uses: actions/setup-node@v4
        name: Setup node
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.pull_request_merged }}

      - run: pnpm install --frozen-lockfile
        name: Install dependencies
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.pull_request_merged }}

      - run: pnpm test
        name: Run tests
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.pull_request_merged }}

      - run: pnpm build
        name: Run build
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.pull_request_merged }}

      - name: Check which packages have releases
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.pull_request_merged }}
        id: changed-packages
        run: |
          CHANGED_PACKAGES=""
          # Check if UI package has version/CHANGELOG changes (release-please updates these)
          if git diff --name-only HEAD~1 HEAD | grep -qE "^packages/ui/(package\.json|CHANGELOG\.md)"; then
            CHANGED_PACKAGES="${CHANGED_PACKAGES}ui "
          fi
          # Check if style-dictionary package has version/CHANGELOG changes
          if git diff --name-only HEAD~1 HEAD | grep -qE "^packages/style-dictionary/(package\.json|CHANGELOG\.md)"; then
            CHANGED_PACKAGES="${CHANGED_PACKAGES}style-dictionary "
          fi
          echo "packages=$CHANGED_PACKAGES" >> $GITHUB_OUTPUT
          echo "Packages with releases: $CHANGED_PACKAGES"

      - name: Publish @grantcodes/ui
        if: ${{ (steps.release.outputs.release_created || steps.release.outputs.pull_request_merged) && contains(steps.changed-packages.outputs.packages, 'ui') }}
        working-directory: packages/ui
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @grantcodes/style-dictionary
        if: ${{ (steps.release.outputs.release_created || steps.release.outputs.pull_request_merged) && contains(steps.changed-packages.outputs.packages, 'style-dictionary') }}
        working-directory: packages/style-dictionary
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
