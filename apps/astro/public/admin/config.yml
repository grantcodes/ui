backend:
  name: github
  repo: grantcodes/ui

media_folder: public/media
public_folder: /media

i18n:
  default_locale: en
  locales:
    - en
    - es

collections:
  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - label: Blocks
        name: blocks
        widget: list
        types:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string, required: false }
              - { label: Image URL, name: image, widget: string, required: false }
              - { label: Button Text, name: button, widget: string, required: false }
              - { label: Button Link, name: href, widget: string, required: false }
              - { label: Size, name: size, widget: select, options: [sm, md, lg], default: md }
              - { label: Center Align, name: center, widget: boolean, default: false }
          - label: Text
            name: text
            widget: object
            fields:
              - { label: Content, name: content, widget: markdown }
          - label: Gallery
            name: gallery
            widget: object
            fields:
              - label: Images
                name: images
                widget: list
                fields:
                  - { label: Image URL, name: src, widget: image }
                  - { label: Alt Text, name: alt, widget: string, required: false }
                  - { label: Caption, name: caption, widget: string, required: false }
          - label: Accordion
            name: accordion
            widget: object
            fields:
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Content, name: content, widget: markdown }
          - label: Cards
            name: cards
            widget: object
            fields:
              - label: Cards
                name: cards
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
                  - { label: Image URL, name: image, widget: image, required: false }
                  - { label: Link, name: href, widget: string, required: false }
          - label: Form
            name: form
            widget: object
            fields:
              - { label: Title, name: title, widget: string, required: false }
              - { label: Submit Text, name: submitText, widget: string, default: Submit }
              - { label: Success Message, name: successMessage, widget: string, default: "Thank you for your message!" }
              - { label: Notify Email, name: notifyEmail, widget: string }

  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Description, name: description, widget: text }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: richtext }

  - name: settings
    label: Settings
    files:
      - name: navigation
        label: Navigation
        file: src/content/navigation/navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: href, widget: string }
              - { label: Order, name: order, widget: number, default: 0 }
              - { label: Locale, name: locale, widget: string, default: en }
      - name: site
        label: Site Settings
        file: src/content/settings/settings.json
        fields:
          - { label: Site Title, name: title, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Contact Email, name: contactEmail, widget: string, required: false }
